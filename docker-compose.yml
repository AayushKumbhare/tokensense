# Self-hosted Postgres for local dev or fully self-managed deployments. Most
# users don't need this — a free hosted Postgres with pgvector (e.g. Neon,
# https://neon.tech) is less setup and works with the same TOKENSENSE_DB_URL.
# See README "Database" section.
services:
  db:
    image: pgvector/pgvector:pg17
    container_name: tokensense-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TOKENSENSE_DB_USER:-tokensense}
      POSTGRES_PASSWORD: ${TOKENSENSE_DB_PASSWORD:?set TOKENSENSE_DB_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: ${TOKENSENSE_DB_NAME:-tokensense}
    ports:
      - "${TOKENSENSE_DB_PORT:-5432}:5432"
    volumes:
      - tokensense_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TOKENSENSE_DB_USER:-tokensense} -d ${TOKENSENSE_DB_NAME:-tokensense}"]
      interval: 2s
      timeout: 3s
      retries: 15

  server:
    build: .
    container_name: tokensense-server
    restart: unless-stopped
    profiles: ["server"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      TOKENSENSE_DB_URL: postgresql://${TOKENSENSE_DB_USER:-tokensense}:${TOKENSENSE_DB_PASSWORD:?set TOKENSENSE_DB_PASSWORD in .env (see .env.example)}@db:5432/${TOKENSENSE_DB_NAME:-tokensense}
    ports:
      - "${TOKENSENSE_PORT:-8317}:8317"

volumes:
  tokensense_pgdata:
